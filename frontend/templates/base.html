<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Indian Income Predictor</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

<nav class="navbar navbar-expand-lg custom-navbar sticky-top">
    <div class="container">
        <a class="navbar-brand fw-bold text-white" href="/">
            <span class="brand-icon">🇮🇳</span> Income<span class="brand-highlight">Predictor</span>
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto" id="nav-links">
                <!-- Dynamically populated based on auth status -->
            </ul>
        </div>
    </div>
</nav>

<div class="main-content container mt-5">
    {% block content %}
    {% endblock %}
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    document.addEventListener("DOMContentLoaded", function() {
        const token = localStorage.getItem('access_token');
        const navLinks = document.getElementById('nav-links');
        
        if (token) {
            navLinks.innerHTML = `
                <li class="nav-item"><a class="nav-link" href="/">💰 Predict</a></li>
                <li class="nav-item"><a class="nav-link" href="/dashboard/">📋 Dashboard</a></li>
                <li class="nav-item"><a class="nav-link" href="/analytics/">📊 Analytics</a></li>
                <li class="nav-item"><a class="nav-link" href="/statistics/">📈 Statistics</a></li>
                <li class="nav-item"><a class="nav-link" href="#" onclick="logout()">🚪 Logout</a></li>
            `;
        } else {
            navLinks.innerHTML = `
                <li class="nav-item"><a class="nav-link" href="/login/">🔐 Login</a></li>
                <li class="nav-item"><a class="nav-link" href="/signup/">👤 Sign Up</a></li>
            `;
        }
    });

    function logout() {
        localStorage.removeItem('access_token');
        window.location.href = '/login/';
    }
</script>
{% block scripts %}{% endblock %}
</body>
</html>
